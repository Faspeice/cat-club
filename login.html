<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>КэтКлуб - Вход / Регистрация</title>
  <style>
    /* --- ОБЩИЕ СТИЛИ --- */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #e3dee3; /* Светло-серо-фиолетовый фон */
      color: #333;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* --- КАРТОЧКА ФОРМЫ --- */
    .auth-card {
      background-color: white;
      padding: 50px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .auth-title {
      font-size: 32px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 35px;
      color: #000;
    }

    /* --- ПОЛЯ ВВОДА --- */
    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #333;
    }

    .form-input {
      width: 100%;
      padding: 12px 15px;
      font-size: 14px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background-color: #f5f4f8;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-input:focus {
      outline: none;
      border-color: #8e7f8f;
      box-shadow: 0 0 0 3px rgba(142, 127, 143, 0.1);
    }

    /* Иконка глаза для пароля */
    .password-container {
      position: relative;
    }

    .password-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      color: #888;
      padding: 5px;
    }

    .password-toggle:hover {
      color: #333;
    }

    /* --- КНОПКА --- */
    .auth-button {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: 500;
      color: white;
      background-color: #8e7f8f;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 10px;
      margin-bottom: 25px;
      box-shadow: 0 3px 10px rgba(142, 127, 143, 0.3);
      transition: background-color 0.2s, box-shadow 0.2s;
    }

    .auth-button:hover {
      background-color: #7a6b7b;
      box-shadow: 0 4px 15px rgba(142, 127, 143, 0.4);
    }

    /* --- РАЗДЕЛИТЕЛЬ --- */
    .divider {
      height: 1px;
      background-color: #eee;
      margin-bottom: 25px;
    }

    /* --- ПЕРЕКЛЮЧАТЕЛЬ --- */
    .auth-switch {
      text-align: center;
      font-size: 16px;
      color: #333;
    }

    .auth-switch a {
      color: #333;
      text-decoration: none;
      font-weight: 500;
      margin-left: 10px;
      transition: color 0.2s;
    }

    .auth-switch a:hover {
      color: #8e7f8f;
      text-decoration: underline;
    }

    /* --- СКРЫТИЕ/ПОКАЗ ФОРМ --- */
    .form-section {
      display: none;
    }

    .form-section.active {
      display: block;
    }

    /* --- АДАПТИВ --- */
    @media (max-width: 480px) {
      .auth-card {
        padding: 40px 25px;
        margin: 20px;
      }
      .auth-title {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>

<div class="auth-card">

  <!-- Форма ВХОДА -->
  <div class="form-section active" id="loginForm">
    <h1 class="auth-title">Добро пожаловать!</h1>

    <form>
      <div class="form-group">
        <label class="form-label" for="login-login">Логин</label>
        <input type="text" id="login-login" class="form-input" value="lubluKoshek" placeholder="Введите логин">
      </div>

      <div class="form-group">
        <label class="form-label" for="login-password">Пароль</label>
        <div class="password-container">
          <input type="password" id="login-password" class="form-input" value="1234" placeholder="Введите пароль">
          <button type="button" class="password-toggle" onclick="togglePassword('login-password', this)">👁</button>
        </div>
      </div>

      <button type="submit" class="auth-button">Вход</button>
    </form>

    <div class="divider"></div>

    <div class="auth-switch">
      Регистрация <a href="#" onclick="showForm('registerForm'); return false;">→</a>
    </div>
  </div>

  <!-- Форма РЕГИСТРАЦИИ -->
  <div class="form-section" id="registerForm">
    <h1 class="auth-title">Добро пожаловать!</h1>

    <form>
      <div class="form-group">
        <label class="form-label" for="reg-login">Логин</label>
        <input type="text" id="reg-login" class="form-input" value="lubluKoshek" placeholder="Придумайте логин">
      </div>

      <div class="form-group">
        <label class="form-label" for="reg-password">Пароль</label>
        <div class="password-container">
          <input type="password" id="reg-password" class="form-input" value="1234" placeholder="Придумайте пароль">
          <button type="button" class="password-toggle" onclick="togglePassword('reg-password', this)">👁</button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="reg-confirm">Повторите пароль</label>
        <div class="password-container">
          <input type="password" id="reg-confirm" class="form-input" value="1234" placeholder="Повторите пароль">
          <button type="button" class="password-toggle" onclick="togglePassword('reg-confirm', this)">👁</button>
        </div>
      </div>

      <button type="submit" class="auth-button">Регистрация</button>
    </form>

    <div class="divider"></div>

    <div class="auth-switch">
      Вход <a href="#" onclick="showForm('loginForm'); return false;">→</a>
    </div>
  </div>

</div>

<script>
  // Переключение между формами
  function showForm(formId) {
    document.querySelectorAll('.form-section').forEach(form => {
      form.classList.remove('active');
    });
    document.getElementById(formId).classList.add('active');
  }

  // Показать/скрыть пароль
  function togglePassword(inputId, button) {
    const input = document.getElementById(inputId);
    if (input.type === 'password') {
      input.type = 'text';
      button.textContent = '';
    } else {
      input.type = 'password';
      button.textContent = '👁';
    }
  }
</script>

</body>
</html>
