##
## Example nginx config (PHP-FPM) for Cat Club
## - Clean URLs via try_files -> public/index.php
## - 301 redirect www -> non-www (adjust if you want opposite)
## - Static assets cache headers
##

server {
    listen 80;
    server_name www.example.com;
    return 301 http://example.com$request_uri;
}

server {
    listen 80;
    server_name example.com;

    root /var/www/cat-club-frontend/public;
    index index.php;

    # Static assets
    location /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Main routing (clean URLs)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        fastcgi_pass 127.0.0.1:9000; # adjust to your php-fpm socket/port
    }

    # Deny internal folders if accidentally exposed
    location ~ ^/(app|nginx)/ {
        return 403;
    }
}

