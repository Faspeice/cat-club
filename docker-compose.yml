services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cat_club
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./app/db/schema.sql:/docker-entrypoint-initdb.d/10_schema.sql:ro
      - ./app/db/seed.sql:/docker-entrypoint-initdb.d/20_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cat_club"]
      interval: 5s
      timeout: 3s
      retries: 20

  php:
    build:
      context: .
    environment:
      # Used by app/config/config.php (we provide docker variant below)
      CATCLUB_DB_DSN: "pgsql:host=db;port=5432;dbname=cat_club"
      CATCLUB_DB_USER: "postgres"
      CATCLUB_DB_PASS: "postgres"
    volumes:
      - ./:/var/www/html
      - ./docker/app/config.php:/var/www/html/app/config/config.php:ro
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

volumes:
  pgdata:

